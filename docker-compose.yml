version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fortiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fortiq
      POSTGRES_USER: fortiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fortiq-dev-2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortiq -d fortiq"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - fortiq-network

  redis:
    image: redis:7-alpine
    container_name: fortiq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fortiq-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fortiq-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://fortiq:${POSTGRES_PASSWORD:-fortiq-dev-2024}@postgres:5432/fortiq
      SYNC_DATABASE_URL: postgresql+psycopg2://fortiq:${POSTGRES_PASSWORD:-fortiq-dev-2024}@postgres:5432/fortiq
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-CF2OprmhDjMHHfxG9wURjcdZDJZmcy4eQvNaD3n1kBM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VQC_PARAMS_PATH: models/vqc_params.npy
      SVM_MODEL_PATH: models/svm_model.pkl
      NORMALIZER_PATH: models/normalizer.pkl
    volumes:
      - ./backend/models:/app/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fortiq-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fortiq-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://fortiq:${POSTGRES_PASSWORD:-fortiq-dev-2024}@postgres:5432/fortiq
      SYNC_DATABASE_URL: postgresql+psycopg2://fortiq:${POSTGRES_PASSWORD:-fortiq-dev-2024}@postgres:5432/fortiq
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-CF2OprmhDjMHHfxG9wURjcdZDJZmcy4eQvNaD3n1kBM}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VQC_PARAMS_PATH: models/vqc_params.npy
      SVM_MODEL_PATH: models/svm_model.pkl
      NORMALIZER_PATH: models/normalizer.pkl
    volumes:
      - ./backend/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - fortiq-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fortiq-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - fortiq-network

volumes:
  postgres_data:
    driver: local

networks:
  fortiq-network:
    driver: bridge
